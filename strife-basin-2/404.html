<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The BASE_URL placeholder gives the favicon the SAME base prefix Vite gives the JS/CSS bundles.
         A bare relative href only works when served at the base root; this keeps it correct under any
         subpath. See base in vite.config.ts. -->
    <link rel="icon" type="image/svg+xml" href="/strife-basin-2/favicon.svg" />
    <title>Strife Basin 2</title>
    <meta
      name="description"
      content="Strife Basin 2 — a fast top-down lane-battler. Build spawners, tech up your army, defend your Nexus with cannon turrets, and crush the enemy base."
    />
    <!-- Link unfurl (Open Graph + Twitter card) for Slack / Discord / etc. og:image is relative to
         /strife-basin-2/ (the deploy base); scrapers resolve it against the page host. For strict absolute-URL
         crawlers (Facebook/Twitter), set an absolute URL at deploy time. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Strife Basin 2" />
    <meta property="og:title" content="Strife Basin 2" />
    <meta
      property="og:description"
      content="A fast top-down lane-battler — build spawners, tech your army, defend your Nexus with cannon turrets, and crush the enemy base."
    />
    <meta property="og:image" content="/strife-basin-2/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Strife Basin 2" />
    <meta
      name="twitter:description"
      content="A fast top-down lane-battler — build, tech up, defend your Nexus, and crush the enemy base."
    />
    <meta name="twitter:image" content="/strife-basin-2/og-image.png" />
    <meta name="theme-color" content="#161821" />
    <script type="module" crossorigin src="/strife-basin-2/assets/index-BszdZ7Xj.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
