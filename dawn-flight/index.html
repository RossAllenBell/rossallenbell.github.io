<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The BASE_URL placeholder gives the favicon the SAME base prefix Vite gives the JS/CSS bundles.
         A bare relative href only works when served at the base root; this keeps it correct under any
         subpath. See base in vite.config.ts. -->
    <link rel="icon" type="image/svg+xml" href="/dawn-flight/favicon.svg" />
    <title>Dawn Flight</title>
    <meta
      name="description"
      content="Dawn Flight — a vertical bullet-hell shmup. Fly, dodge dense fire, dash through bullets, and break the dawn across ten sectors."
    />
    <!-- Link unfurl (Open Graph + Twitter card) for Slack / Discord / Facebook / etc. Absolute URLs so
         strict crawlers resolve the image without a page host. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dawn Flight" />
    <meta property="og:title" content="Dawn Flight" />
    <meta
      property="og:description"
      content="Ascend · dodge · build · break the dawn — a vertical bullet-hell shmup across ten sectors."
    />
    <meta property="og:url" content="https://rossallenbell.com/dawn-flight/" />
    <meta property="og:image" content="https://rossallenbell.com/dawn-flight/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dawn Flight" />
    <meta
      name="twitter:description"
      content="Ascend · dodge · build · break the dawn — a vertical bullet-hell shmup across ten sectors."
    />
    <meta name="twitter:image" content="https://rossallenbell.com/dawn-flight/og-image.png" />
    <meta name="theme-color" content="#0b0a1a" />
    <script type="module" crossorigin src="/dawn-flight/assets/main-D5jPQqpG.js"></script>
    <link rel="modulepreload" crossorigin href="/dawn-flight/assets/sprites-CvkdHd-R.js">
    <link rel="modulepreload" crossorigin href="/dawn-flight/assets/modulepreload-polyfill-Dezn_h7o.js">
    <link rel="modulepreload" crossorigin href="/dawn-flight/assets/engine-BetAcVFC.js">
    <link rel="stylesheet" crossorigin href="/dawn-flight/assets/main-DtT9bhyd.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
